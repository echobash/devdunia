<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redis Command Explorer — DevDunia Comics</title>
<meta name="description" content="Interactive Redis command reference with examples, syntax, and performance tips.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://devdunia.com/production/redis-command-explorer.html">
<meta property="og:title" content="Redis Command Explorer — DevDunia Comics">
<meta property="og:description" content="Interactive Redis command reference with examples, syntax, and performance tips.">
<meta property="og:image" content="https://devdunia.com/images/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1410;
  --paper: #fdf3e3;
  --paper2: #fbe9cc;
  --red: #e63946;
  --blue: #1d6fb8;
  --yellow: #ffd23f;
  --green: #3fa34d;
  --pink: #ff6b9d;
  --purple: #8a4fff;
  --orange: #ff8c42;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Comic Neue', cursive;
  font-weight: 400;
  color: var(--ink);
  background-color: var(--paper);
  background-image: radial-gradient(var(--ink) 0.5px, transparent 0.6px);
  background-size: 14px 14px;
  background-attachment: fixed;
  min-height: 100vh;
}
.paper-overlay {
  position: fixed; inset: 0;
  background: rgba(253,243,227,.78);
  pointer-events: none; z-index: 0;
}
.page-wrap {
  position: relative; z-index: 1;
  max-width: 1240px; margin: 0 auto;
  padding: 20px 32px 60px;
}







.hero {
  display: flex; align-items: flex-start; gap: 20px;
  background: var(--paper2);
  border: 4px solid var(--ink); border-radius: 6px;
  box-shadow: 7px 7px 0 var(--ink);
  padding: 20px 24px; margin-bottom: 28px;
  transform: rotate(-0.4deg);
}
.hero-icon { font-size: 3rem; line-height: 1; flex-shrink: 0; filter: drop-shadow(3px 3px 0 var(--ink)); }
.hero-text h1 {
  font-family: 'Bangers', cursive; font-size: 2.8rem;
  letter-spacing: 2px; color: var(--red);
  -webkit-text-stroke: 1px var(--ink);
  text-shadow: 4px 4px 0 var(--ink);
  line-height: 1; text-transform: uppercase;
}
.hero-text p { font-size: .95rem; margin-top: 6px; line-height: 1.5; max-width: 520px; }
.hero-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.badge {
  font-family: 'Space Mono', monospace; font-size: .65rem; font-weight: 700;
  padding: 3px 8px; border: 2px solid var(--ink);
  border-radius: 4px; box-shadow: 2px 2px 0 var(--ink);
}
.badge-red    { background: var(--red);    color: #fff; }
.badge-blue   { background: var(--blue);   color: #fff; }
.badge-green  { background: var(--green);  color: #fff; }
.badge-yellow { background: var(--yellow); color: var(--ink); }
.badge-purple { background: var(--purple); color: #fff; }
/* Search & filter */
.search-panel {
  background: var(--paper);
  border: 4px solid var(--ink); border-radius: 6px;
  box-shadow: 7px 7px 0 var(--ink);
  padding: 16px 20px; margin-bottom: 22px;
}
.search-row {
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
}
.search-input {
  flex: 1; min-width: 200px;
  background: #fff; border: 3px solid var(--ink);
  border-radius: 6px; padding: 8px 14px;
  font-family: 'Space Mono', monospace; font-size: .85rem;
  color: var(--ink); box-shadow: 3px 3px 0 var(--ink);
  outline: none;
}
.search-input:focus { border-color: var(--red); box-shadow: 3px 3px 0 var(--red); }
.filter-btns { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-btn {
  font-family: 'Bangers', cursive; font-size: .9rem;
  letter-spacing: 1px; border: 3px solid var(--ink);
  border-radius: 6px; padding: 5px 14px;
  cursor: pointer; box-shadow: 3px 3px 0 var(--ink);
  transition: transform .1s, box-shadow .1s;
  background: var(--paper2); color: var(--ink);
}
.cat-btn:active { transform: translate(1px,1px); box-shadow: 2px 2px 0 var(--ink); }
.cat-btn.active { background: var(--red); color: #fff; }
/* Commands grid */
.commands-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}
.command-card {
  background: var(--paper);
  border: 4px solid var(--ink); border-radius: 6px;
  box-shadow: 6px 6px 0 var(--ink);
  overflow: hidden;
  transition: transform .1s, box-shadow .1s;
}
.command-card:hover { transform: translate(-2px,-2px); box-shadow: 8px 8px 0 var(--ink); }
.command-card-header {
  background: var(--ink); color: var(--yellow);
  font-family: 'Bangers', cursive; font-size: 1.3rem;
  letter-spacing: 2px; padding: 8px 14px;
  display: flex; align-items: center; justify-content: space-between;
}
.cmd-badges { display: flex; gap: 5px; align-items: center; }
.freq-badge {
  font-family: 'Space Mono', monospace; font-size: .6rem;
  font-weight: 700; padding: 2px 6px;
  border-radius: 3px; border: 1px solid rgba(255,255,255,.4);
}
.freq-very-high { background: var(--red); color: #fff; }
.freq-high      { background: var(--orange); color: #fff; }
.freq-medium    { background: var(--yellow); color: var(--ink); }
.freq-low       { background: #888; color: #fff; }
.perf-badge {
  font-family: 'Space Mono', monospace; font-size: .6rem;
  font-weight: 700; padding: 2px 6px;
  border-radius: 3px; background: var(--green); color: #fff;
}
.command-card-body { padding: 12px 14px; }
.cmd-label {
  font-family: 'Bangers', cursive; font-size: .85rem;
  letter-spacing: 1px; color: var(--ink); opacity: .7;
  margin-bottom: 3px; text-transform: uppercase;
}
.cmd-syntax {
  background: var(--ink); color: var(--red);
  font-family: 'Space Mono', monospace; font-size: .75rem;
  padding: 7px 10px; border-radius: 4px;
  margin-bottom: 8px; word-break: break-all;
}
.cmd-example {
  background: var(--ink); color: var(--green);
  font-family: 'Space Mono', monospace; font-size: .75rem;
  padding: 7px 10px; border-radius: 4px;
  margin-bottom: 8px;
  display: flex; align-items: flex-start; justify-content: space-between; gap: 6px;
}
.cmd-example-text { flex: 1; word-break: break-all; }
.btn-copy-sm {
  font-family: 'Bangers', cursive; font-size: .75rem;
  background: var(--yellow); color: var(--ink);
  border: 1px solid var(--ink); border-radius: 3px;
  padding: 2px 7px; cursor: pointer; flex-shrink: 0;
  transition: transform .1s;
}
.btn-copy-sm:active { transform: translate(1px,1px); }
.cmd-desc { font-size: .83rem; line-height: 1.5; margin-bottom: 6px; }
.cmd-usecase { font-size: .8rem; color: var(--blue); font-weight: 700; }
.no-results {
  grid-column: 1 / -1;
  text-align: center; padding: 40px 20px;
}
.no-results-title {
  font-family: 'Bangers', cursive; font-size: 2rem;
  letter-spacing: 2px; color: var(--red);
}
.no-results p { font-size: .9rem; margin-top: 6px; }
@media (max-width: 760px) {
  .commands-grid { grid-template-columns: 1fr; }
  .hero { flex-direction: column; gap: 10px; }
  .hero-text h1 { font-size: 2rem; }
  .search-row { flex-direction: column; }
}
</style>
</head>
<body>
<div class="paper-overlay"></div>
<div data-masthead></div>

<div class="page-wrap">

  <div data-tool-hero
     data-title="Redis Command Explorer"
     data-chapter="45"
     data-category="Developer Tools"
     data-icon="&#x1F9E8;"
     data-desc="Interactive Redis command reference with examples, performance complexity, and use cases. Search, filter by category, and copy any command instantly!"
     data-color="blue"
     data-badges="STRINGS,LISTS,SETS,HASHES,SORTED SETS"
     data-badge-colors="red,blue,green,purple,yellow">
  </div>

  <!-- MASTHEAD -->

  <!-- HERO -->
  

  <!-- SEARCH & FILTER -->
  <div class="search-panel">
    <div class="search-row">
      <input type="text" id="command-search" class="search-input" placeholder="Search Redis commands...">
      <div class="filter-btns">
        <button class="cat-btn active" data-category="all">All Commands</button>
        <button class="cat-btn" data-category="strings">Strings</button>
        <button class="cat-btn" data-category="lists">Lists</button>
        <button class="cat-btn" data-category="sets">Sets</button>
        <button class="cat-btn" data-category="hashes">Hashes</button>
        <button class="cat-btn" data-category="sorted-sets">Sorted Sets</button>
        <button class="cat-btn" data-category="keys">Keys</button>
      </div>
    </div>
  </div>

  <!-- COMMANDS DISPLAY -->
  <div id="commands-container" class="commands-grid"></div>

</div><!-- /page-wrap -->

<script>
var redisCommands = {
  strings: [
    { command:"GET", syntax:"GET key", description:"Get the value of a key", example:"GET mykey", performance:"O(1)", useCase:"Retrieve cached data, simple lookups", usageRank:1, frequency:"Very High" },
    { command:"SET", syntax:"SET key value [EX seconds] [PX milliseconds] [NX|XX]", description:"Set the string value of a key", example:"SET mykey \"Hello World\" EX 3600", performance:"O(1)", useCase:"Basic key-value storage, caching, session storage", usageRank:2, frequency:"Very High" },
    { command:"DEL", syntax:"DEL key [key ...]", description:"Delete a key", example:"DEL mykey", performance:"O(1) per key", useCase:"Cleanup, cache invalidation", usageRank:3, frequency:"Very High" },
    { command:"MGET", syntax:"MGET key [key ...]", description:"Get the values of all given keys", example:"MGET key1 key2 key3", performance:"O(N)", useCase:"Batch retrieval, reducing round trips", usageRank:4, frequency:"High" },
    { command:"MSET", syntax:"MSET key value [key value ...]", description:"Set multiple keys to multiple values", example:"MSET key1 \"Hello\" key2 \"World\"", performance:"O(N)", useCase:"Batch operations, bulk data insertion", usageRank:5, frequency:"High" },
    { command:"EXISTS", syntax:"EXISTS key [key ...]", description:"Determine if a key exists", example:"EXISTS mykey", performance:"O(1) per key", useCase:"Validation, conditional operations", usageRank:6, frequency:"High" },
    { command:"KEYS", syntax:"KEYS pattern", description:"Find all keys matching the given pattern", example:"KEYS user:*", performance:"O(N)", useCase:"Debugging, admin operations (avoid in production)", usageRank:7, frequency:"High" },
    { command:"EXPIRE", syntax:"EXPIRE key seconds", description:"Set a key's time to live in seconds", example:"EXPIRE mykey 3600", performance:"O(1)", useCase:"TTL management, cache expiration", usageRank:8, frequency:"Medium" },
    { command:"TTL", syntax:"TTL key", description:"Get the time to live for a key", example:"TTL mykey", performance:"O(1)", useCase:"Monitoring expiration, debugging", usageRank:9, frequency:"Medium" },
    { command:"INCR", syntax:"INCR key", description:"Increment the integer value of a key by one", example:"INCR counter", performance:"O(1)", useCase:"Counters, rate limiting, unique IDs", usageRank:10, frequency:"Medium" },
    { command:"APPEND", syntax:"APPEND key value", description:"Append a value to a key", example:"APPEND mykey \" World\"", performance:"O(1)", useCase:"Logging, building strings incrementally", usageRank:11, frequency:"Low" }
  ],
  lists: [
    { command:"LPUSH", syntax:"LPUSH key element [element ...]", description:"Prepend one or more elements to a list", example:"LPUSH mylist \"world\" \"hello\"", performance:"O(1) per element", useCase:"Stacks, recent items, activity feeds", usageRank:11, frequency:"High" },
    { command:"RPUSH", syntax:"RPUSH key element [element ...]", description:"Append one or more elements to a list", example:"RPUSH mylist \"item1\" \"item2\"", performance:"O(1) per element", useCase:"Queues, FIFO operations, message queues", usageRank:12, frequency:"High" },
    { command:"LRANGE", syntax:"LRANGE key start stop", description:"Get a range of elements from a list", example:"LRANGE mylist 0 -1", performance:"O(S+N)", useCase:"Pagination, retrieving multiple items", usageRank:13, frequency:"Medium" },
    { command:"LLEN", syntax:"LLEN key", description:"Get the length of a list", example:"LLEN mylist", performance:"O(1)", useCase:"Monitoring queue size, validation", usageRank:14, frequency:"Medium" },
    { command:"LPOP", syntax:"LPOP key [count]", description:"Remove and get the first elements in a list", example:"LPOP mylist", performance:"O(1) per element", useCase:"Stack operations, task processing", usageRank:15, frequency:"Medium" },
    { command:"RPOP", syntax:"RPOP key [count]", description:"Remove and get the last elements in a list", example:"RPOP mylist", performance:"O(1) per element", useCase:"Queue operations, LIFO processing", usageRank:16, frequency:"Medium" }
  ],
  sets: [
    { command:"SADD", syntax:"SADD key member [member ...]", description:"Add one or more members to a set", example:"SADD myset \"member1\" \"member2\"", performance:"O(1) per member", useCase:"Unique collections, tags, categories", usageRank:17, frequency:"Medium" },
    { command:"SMEMBERS", syntax:"SMEMBERS key", description:"Get all the members in a set", example:"SMEMBERS myset", performance:"O(N)", useCase:"Retrieving all unique items", usageRank:18, frequency:"Medium" },
    { command:"SCARD", syntax:"SCARD key", description:"Get the number of members in a set", example:"SCARD myset", performance:"O(1)", useCase:"Counting unique items", usageRank:19, frequency:"Medium" },
    { command:"SREM", syntax:"SREM key member [member ...]", description:"Remove one or more members from a set", example:"SREM myset \"member1\"", performance:"O(1) per member", useCase:"Removing items from collections", usageRank:20, frequency:"Low" },
    { command:"SINTER", syntax:"SINTER key [key ...]", description:"Intersect multiple sets", example:"SINTER set1 set2", performance:"O(N*M)", useCase:"Finding common elements, filtering", usageRank:21, frequency:"Low" },
    { command:"SUNION", syntax:"SUNION key [key ...]", description:"Add multiple sets", example:"SUNION set1 set2", performance:"O(N)", useCase:"Combining collections, merging tags", usageRank:22, frequency:"Low" }
  ],
  hashes: [
    { command:"HGET", syntax:"HGET key field", description:"Get the value of a hash field", example:"HGET user:1000 name", performance:"O(1)", useCase:"Retrieving specific object properties", usageRank:12, frequency:"Very High" },
    { command:"HSET", syntax:"HSET key field value [field value ...]", description:"Set the string value of a hash field", example:"HSET user:1000 name \"John\" age \"30\"", performance:"O(1) per field", useCase:"Object storage, user profiles, configurations", usageRank:13, frequency:"Very High" },
    { command:"HGETALL", syntax:"HGETALL key", description:"Get all the fields and values in a hash", example:"HGETALL user:1000", performance:"O(N)", useCase:"Retrieving complete objects", usageRank:14, frequency:"High" },
    { command:"HKEYS", syntax:"HKEYS key", description:"Get all the fields in a hash", example:"HKEYS user:1000", performance:"O(N)", useCase:"Getting object field names", usageRank:15, frequency:"High" },
    { command:"HDEL", syntax:"HDEL key field [field ...]", description:"Delete one or more hash fields", example:"HDEL user:1000 age", performance:"O(1) per field", useCase:"Removing object properties", usageRank:16, frequency:"Medium" },
    { command:"HINCRBY", syntax:"HINCRBY key field increment", description:"Increment the integer value of a hash field", example:"HINCRBY user:1000 score 10", performance:"O(1)", useCase:"Counters within objects, scores", usageRank:17, frequency:"Medium" }
  ],
  "sorted-sets": [
    { command:"ZADD", syntax:"ZADD key [NX|XX] [CH] [INCR] score member [score member ...]", description:"Add one or more members to a sorted set", example:"ZADD leaderboard 100 \"player1\" 200 \"player2\"", performance:"O(log N) per member", useCase:"Leaderboards, rankings, time-series data", usageRank:18 },
    { command:"ZRANGE", syntax:"ZRANGE key start stop [WITHSCORES]", description:"Return a range of members in a sorted set", example:"ZRANGE leaderboard 0 9 WITHSCORES", performance:"O(log N + M)", useCase:"Top N queries, pagination", usageRank:19 },
    { command:"ZREVRANGE", syntax:"ZREVRANGE key start stop [WITHSCORES]", description:"Return a range of members in a sorted set (reverse)", example:"ZREVRANGE leaderboard 0 9 WITHSCORES", performance:"O(log N + M)", useCase:"Highest scores, recent items", usageRank:20 },
    { command:"ZREM", syntax:"ZREM key member [member ...]", description:"Remove one or more members from a sorted set", example:"ZREM leaderboard \"player1\"", performance:"O(log N) per member", useCase:"Removing items from rankings", usageRank:21 },
    { command:"ZCARD", syntax:"ZCARD key", description:"Get the number of members in a sorted set", example:"ZCARD leaderboard", performance:"O(1)", useCase:"Counting ranked items", usageRank:22 },
    { command:"ZSCORE", syntax:"ZSCORE key member", description:"Get the score associated with the given member", example:"ZSCORE leaderboard \"player1\"", performance:"O(1)", useCase:"Getting specific scores", usageRank:23 }
  ],
  keys: [
    { command:"KEYS", syntax:"KEYS pattern", description:"Find all keys matching the given pattern", example:"KEYS user:*", performance:"O(N)", useCase:"Debugging, admin operations (avoid in production)", usageRank:7 },
    { command:"EXISTS", syntax:"EXISTS key [key ...]", description:"Determine if a key exists", example:"EXISTS mykey", performance:"O(1) per key", useCase:"Validation, conditional operations", usageRank:6 },
    { command:"DEL", syntax:"DEL key [key ...]", description:"Delete a key", example:"DEL mykey", performance:"O(1) per key", useCase:"Cleanup, cache invalidation", usageRank:3 },
    { command:"EXPIRE", syntax:"EXPIRE key seconds", description:"Set a key's time to live in seconds", example:"EXPIRE mykey 3600", performance:"O(1)", useCase:"TTL management, cache expiration", usageRank:8 },
    { command:"TTL", syntax:"TTL key", description:"Get the time to live for a key", example:"TTL mykey", performance:"O(1)", useCase:"Monitoring expiration, debugging", usageRank:9 },
    { command:"TYPE", syntax:"TYPE key", description:"Determine the type stored at key", example:"TYPE mykey", performance:"O(1)", useCase:"Debugging, type validation", usageRank:10 }
  ]
};

var currentCategory = 'all';
var currentSearch = '';

function getFreqClass(f) {
  if (!f) return '';
  switch(f) {
    case 'Very High': return 'freq-very-high';
    case 'High':      return 'freq-high';
    case 'Medium':    return 'freq-medium';
    case 'Low':       return 'freq-low';
    default:          return '';
  }
}

function createCard(cmd) {
  var card = document.createElement('div');
  card.className = 'command-card';

  var freqHtml = cmd.frequency
    ? '<span class="freq-badge ' + getFreqClass(cmd.frequency) + '">' + cmd.frequency + '</span>'
    : '';

  card.innerHTML =
    '<div class="command-card-header">' +
      cmd.command +
      '<div class="cmd-badges">' +
        '<span class="perf-badge">' + cmd.performance + '</span>' +
        freqHtml +
      '</div>' +
    '</div>' +
    '<div class="command-card-body">' +
      '<div class="cmd-label">Syntax</div>' +
      '<div class="cmd-syntax">' + escHtml(cmd.syntax) + '</div>' +
      '<div class="cmd-label">Example</div>' +
      '<div class="cmd-example">' +
        '<span class="cmd-example-text">' + escHtml(cmd.example) + '</span>' +
        '<button class="btn-copy-sm" onclick="copyText(this, \'' + escAttr(cmd.example) + '\')">COPY</button>' +
      '</div>' +
      '<div class="cmd-desc">' + escHtml(cmd.description) + '</div>' +
      '<div class="cmd-usecase">&#x25B6; ' + escHtml(cmd.useCase) + '</div>' +
    '</div>';

  return card;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}

function displayCommands() {
  var list = [];
  if (currentCategory === 'all') {
    Object.values(redisCommands).forEach(function(arr) {
      arr.forEach(function(c) { list.push(c); });
    });
  } else {
    list = redisCommands[currentCategory] || [];
  }

  if (currentSearch) {
    var q = currentSearch;
    list = list.filter(function(c) {
      return c.command.toLowerCase().includes(q) ||
             c.description.toLowerCase().includes(q) ||
             c.useCase.toLowerCase().includes(q);
    });
  }

  list.sort(function(a,b) { return (a.usageRank||99) - (b.usageRank||99); });

  var container = document.getElementById('commands-container');
  container.innerHTML = '';

  if (list.length === 0) {
    container.innerHTML = '<div class="no-results"><div class="no-results-title">&#x1F4A5; No Commands Found!</div><p>Try adjusting your search or category filter.</p></div>';
    return;
  }

  list.forEach(function(cmd) {
    container.appendChild(createCard(cmd));
  });
}

function copyText(btn, text) {
  var orig = btn.textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() {
      btn.textContent = 'OK!';
      btn.style.background = 'var(--green)';
      btn.style.color = '#fff';
      setTimeout(function() {
        btn.textContent = orig;
        btn.style.background = '';
        btn.style.color = '';
      }, 1200);
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch(e){}
    document.body.removeChild(ta);
    btn.textContent = 'OK!';
    setTimeout(function() { btn.textContent = orig; }, 1200);
  }
}

// Search
document.getElementById('command-search').addEventListener('input', function(e) {
  currentSearch = e.target.value.toLowerCase();
  displayCommands();
});

// Category buttons
var catBtns = document.querySelectorAll('.cat-btn');
catBtns.forEach(function(btn) {
  btn.addEventListener('click', function() {
    currentCategory = this.dataset.category;
    catBtns.forEach(function(b) { b.classList.remove('active'); });
    this.classList.add('active');
    displayCommands();
  });
});

displayCommands();
</script>
<script src="masthead.js"></script>
<script src="hero-banner.js"></script>
<script src="author-card.js"></script>
</body>
</html>
