<style>
:root{--ink:#1a1410;--paper:#fdf3e3;--paper2:#fbe9cc;--red:#e63946;--blue:#1d6fb8;--yellow:#ffd23f;--green:#3fa34d;--pink:#ff6b9d;--purple:#8a4fff;--orange:#ff8c42;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Comic Neue',cursive;font-weight:400;color:var(--ink);background-color:var(--paper);background-image:radial-gradient(var(--ink) 0.5px,transparent 0.6px);background-size:14px 14px;background-attachment:fixed;min-height:100vh;}
.paper-overlay{position:fixed;inset:0;background:rgba(253,243,227,.78);pointer-events:none;z-index:0;}
.page-wrap{position:relative;z-index:1;max-width: 1240px;margin:0 auto;padding: 20px 32px 60px;}







.hero{display:flex;align-items:flex-start;gap:20px;background:var(--paper2);border:4px solid var(--ink);border-radius:6px;box-shadow:7px 7px 0 var(--ink);padding:20px 24px;margin-bottom:28px;transform:rotate(-0.4deg);}
.hero-icon{font-size:3rem;line-height:1;flex-shrink:0;filter:drop-shadow(3px 3px 0 var(--ink));}
.hero-text h1{font-family:'Bangers',cursive;font-size:2.8rem;letter-spacing:2px;color:var(--blue);-webkit-text-stroke:1px var(--ink);text-shadow:4px 4px 0 var(--ink);line-height:1;text-transform:uppercase;}
.hero-text p{font-size:.95rem;margin-top:6px;line-height:1.5;max-width:480px;}
.hero-badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.badge{font-family:'Space Mono',monospace;font-size:.65rem;font-weight:700;padding:3px 8px;border:2px solid var(--ink);border-radius:4px;box-shadow:2px 2px 0 var(--ink);}
.badge-blue{background:var(--blue);color:#fff;}.badge-green{background:var(--green);color:#fff;}.badge-yellow{background:var(--yellow);color:var(--ink);}.badge-red{background:var(--red);color:#fff;}
.panel{background:var(--paper);border:4px solid var(--ink);border-radius:6px;box-shadow:7px 7px 0 var(--ink);overflow:hidden;margin-bottom:22px;}
.panel-header{background:var(--ink);color:var(--yellow);font-family:'Bangers',cursive;font-size:1.2rem;letter-spacing:2px;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.panel-header .panel-tag{font-family:'Space Mono',monospace;font-size:.65rem;font-weight:700;background:var(--yellow);color:var(--ink);padding:2px 7px;border-radius:3px;}
.panel-body{padding:18px 20px;}
.search-bar{width:100%;background:#fff;border:3px solid var(--ink);border-radius:6px;padding:10px 14px;font-family:'Comic Neue',cursive;font-size:1rem;color:var(--ink);outline:none;box-shadow:3px 3px 0 var(--ink);transition:border-color .15s;}
.search-bar:focus{border-color:var(--blue);}
.search-bar::placeholder{color:#aaa;font-style:italic;}
.emoji-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:8px;margin-top:14px;}
.emoji-card{background:var(--paper2);border:3px solid var(--ink);border-radius:6px;box-shadow:3px 3px 0 var(--ink);padding:8px 4px;text-align:center;cursor:pointer;transition:transform .1s,box-shadow .1s;}
.emoji-card:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--ink);}
.emoji-card:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--ink);}
.emoji-char{font-size:1.8rem;line-height:1;display:block;}
.emoji-code{font-family:'Space Mono',monospace;font-size:.5rem;color:var(--blue);margin-top:3px;word-break:break-all;opacity:.8;}
.cat-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.cat-tab{font-family:'Bangers',cursive;font-size:.88rem;letter-spacing:1px;background:var(--paper2);border:2px solid var(--ink);border-radius:4px;padding:4px 10px;cursor:pointer;box-shadow:2px 2px 0 var(--ink);transition:transform .1s;text-transform:uppercase;}
.cat-tab:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--ink);}
.cat-tab.active{background:var(--blue);color:#fff;}
.count-label{font-family:'Space Mono',monospace;font-size:.72rem;font-weight:700;color:var(--ink);opacity:.6;margin-bottom:8px;}

/* Toast notification */
.toast-notify{position:fixed;bottom:24px;right:24px;background:var(--ink);color:var(--yellow);font-family:'Bangers',cursive;font-size:1.1rem;letter-spacing:1px;padding:10px 20px;border-radius:6px;border:3px solid var(--yellow);box-shadow:4px 4px 0 var(--yellow);opacity:0;transform:translateY(20px);transition:opacity .3s,transform .3s;pointer-events:none;z-index:9999;}
.toast-notify.show{opacity:1;transform:translateY(0);}
@media(max-width:600px){
  .emoji-grid{grid-template-columns:repeat(auto-fill,minmax(60px,1fr));}
  .hero{flex-direction:column;gap:10px;}
  .hero-text h1{font-size:2rem;}
}
</style>

  var grid       = document.getElementById('emojiGrid');
  var search     = document.getElementById('emojiSearch');
  var countLabel = document.getElementById('countLabel');
  var toast      = document.getElementById('toastNotify');
  var catTabs    = document.querySelectorAll('.cat-tab');
  var toastTimer;
  var activeCat  = 'all';

  function showToast(emoji) {
    clearTimeout(toastTimer);
    toast.textContent = '✔ Copied '+emoji;
    toast.classList.add('show');
    toastTimer = setTimeout(function(){toast.classList.remove('show');}, 1800);
  }

  function copyEmoji(emoji) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(emoji).then(function(){showToast(emoji);}).catch(function(){fallbackCopy(emoji);});
    } else { fallbackCopy(emoji); }
  }

  function fallbackCopy(text) {
    var t = document.createElement('textarea');
    t.value = text; document.body.appendChild(t); t.select();
    try{document.execCommand('copy');}catch(e){}
    document.body.removeChild(t);
    showToast(text);
  }

  function render(list) {
    grid.innerHTML = '';
    list.forEach(function(em){
      var card = document.createElement('div');
      card.className = 'emoji-card';
      card.title = em.n + ' — click to copy';
      card.innerHTML = '<span class="emoji-char">'+em.e+'</span><div class="emoji-code">'+em.u+'</div>';
      card.addEventListener('click', function(){copyEmoji(em.e);});
      grid.appendChild(card);
    });
    countLabel.textContent = 'Showing '+list.length+' emoji'+(list.length!==1?'s':'');
  }

  function filter() {
    var term = search.value.toLowerCase().trim();
    var list = emojiData.filter(function(em){
      var matchCat = activeCat==='all' || em.c===activeCat;
      var matchTerm = !term || em.n.toLowerCase().includes(term) || em.e.includes(term);
      return matchCat && matchTerm;
    });
    render(list);
  }

  search.addEventListener('input', filter);

  catTabs.forEach(function(tab){
    tab.addEventListener('click', function(){
      catTabs.forEach(function(t){t.classList.remove('active');});
      tab.classList.add('active');
      activeCat = tab.dataset.cat;
      filter();
    });
  });

  filter();
})();
